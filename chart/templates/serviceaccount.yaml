{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "datasetsServer.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels: {{ include "hf.labels.commons" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
